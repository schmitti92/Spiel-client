<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Barikade</title>

<style>
html, body {
  margin:0;
  padding:0;
  overflow-x:hidden;
  background:#0b0f17;
  color:#fff;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

.wrap{
  max-width:1400px;
  margin:0 auto;
  padding:12px;
  display:flex;
  gap:16px;
  align-items:flex-start;
  overflow-x:hidden;
}

.boardWrap{
  flex:1 1 auto;
  min-width:0;
}

.side{
  width:340px;
  max-width:40vw;
  flex-shrink:0;
}

@media (max-width:1100px){
  .wrap{
    flex-direction:column;
  }
  .side{
    width:100%;
    max-width:100%;
  }
}
</style>

</head>
<body>
<!-- Bestehender Inhalt bleibt unverändert -->
<div class="wrap">
  <div class="boardWrap">
    <!-- Board Canvas bleibt hier -->
  </div>
  <div class="side">
    <!-- Status / Joker Bereich bleibt hier -->
  </div>
</div>

<script src="game.js?v=epic8"></script>
</body>
</html>
