<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mittelalter – Lobby</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0b1220;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.panel{
    background:#121a2b;
    padding:30px;
    border-radius:12px;
    width:420px;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h1{
    margin-top:0;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:14px;
    border-radius:6px;
    border:none;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:6px;
    background:#2e7df6;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#3f8cff;
}

#playerList{
    margin-top:20px;
    background:#0b1220;
    padding:10px;
    border-radius:6px;
    min-height:60px;
}

.player{
    padding:6px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

#roomInfo{
    margin-top:10px;
    font-size:14px;
    opacity:0.8;
}

.startBtn{
    background:#22c55e;
}

.startBtn:hover{
    background:#34d977;
}

.backBtn{
    background:#555;
}

.backBtn:hover{
    background:#777;
}
</style>
</head>

<body>

<div class="panel">

<h1>Mittelalter Lobby</h1>

<label>Dein Name</label>
<input id="nameInput" placeholder="Name eingeben">

<button onclick="createRoom()">Raum erstellen</button>

<label>Raumcode</label>
<input id="roomInput" placeholder="z.B. 1234">

<button onclick="joinRoom()">Raum beitreten</button>

<div id="roomInfo"></div>

<h3>Spieler</h3>
<div id="playerList"></div>

<button class="startBtn" onclick="startGame()">Spiel starten</button>

<button class="backBtn" onclick="goBack()">Zur Spielauswahl</button>

</div>

<div style="margin-top:14px;font-size:12px;opacity:0.75">Aktuell läuft die Lobby im sicheren Testmodus. Der echte Render-Server wird im nächsten Schritt angebunden.</div>

<script src="mittelalter.online.js?v=1"></script>
</body>
</html>
